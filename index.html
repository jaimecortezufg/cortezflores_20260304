<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="Ejemplo de manipulación de imágenes en CSS y Javascript"/>
        <meta name="keywords" content="imagen,background, avatar, css, javascript" />
        <meta name="author" content="Jaime Jeovanny Cortez Flores" />
        <meta name="copyright" content="2026 JJCF" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Jaime Jeovanny Cortez Flores, manejo de imagenes con CSS y Javascript</title>
        <link rel="icon" type="image/x-icon" href="media/img/icons/favicon.ico" />
        <link rel="stylesheet" href="css/style.css" />
        <script src="js/script.js"></script>
    </head>
    <body>
        <!--ETIQUETA SEMÁNTICA HEADER-->
        <header id="imagen-encabezado">
            <div id="imagen-avatar">
                <img src="media/img/avatar/person1.webp" id="avatar" />
            </div>
        </header>
        <!--ETIQUETA SEMÁNTICA MAIN-->
        <main>
            <div class="map">
                <img src="media/img/campos/campo1.png" alt="campos" class="base" draggable="false" onload="baseOnLoad();" />
            </div>
        </main>
    </body>
</html>
